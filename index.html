<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>
処方監査問題集
</title>


<style>

body{

font-family:"メイリオ",sans-serif;

background:
linear-gradient(
135deg,
#e8f4ff,
#ffffff
);

margin:0;

padding:30px;

min-height:100vh;

}


.container{

background:white;

max-width:700px;

margin:auto;

padding:35px;

border-radius:20px;

box-shadow:
0 8px 25px rgba(0,0,0,0.1);

text-align:center;

}


h1{

font-size:28px;

color:#1a4f7a;

}



button{

width:85%;

padding:15px;

margin:8px;

font-size:18px;

cursor:pointer;

border:none;

border-radius:12px;

background:#1976d2;

color:white;

}



button:hover{

opacity:0.85;

}



.progressBox{

margin-top:30px;

text-align:left;

}



.progressBar{

height:20px;

background:#ddd;

border-radius:10px;

overflow:hidden;

}



.progressInner{

height:20px;

background:#4caf50;

border-radius:10px;

width:0%;

}



.menuTitle{

margin-top:35px;

font-size:20px;

font-weight:bold;

color:#1a4f7a;

}


</style>


</head>


<body>


<div class="container">


<h1>
💊 処方監査問題集
</h1>



<button onclick="startAll()">

最初から

</button>



<button onclick="continueStudy()">

続きから

</button>



<button onclick="startUnlearned()">

未学習問題

</button>



<button onclick="startRandom()">

ランダム10問

</button>



<button onclick="startChecked()">

✓復習問題

</button>



<div class="progressBox">


<h2>
学習進捗
</h2>


<div id="progressText">

読み込み中...

</div>


<br>


<div class="progressBar">

<div id="progressInner"
class="progressInner">

</div>

</div>


</div>



<div class="menuTitle">

分類から

</div>


<div id="categoryArea">

</div>



<div class="menuTitle">

問題タイプから

</div>


<div id="typeArea">

</div>
<script>


function startAll(){

localStorage.setItem(
"mode",
"all"
);


localStorage.setItem(
"lastIndex",
"0"
);


location.href="study.html";


}



// 続きから

function continueStudy(){

localStorage.setItem(
"mode",
"continue"
);


location.href="study.html";

}



// 未学習問題

function startUnlearned(){

localStorage.setItem(
"mode",
"unlearned"
);


location.href="study.html";

}



// ランダム10問

function startRandom(){

localStorage.setItem(
"mode",
"random"
);


location.href="study.html";

}



// ✓復習問題

function startChecked(){

localStorage.setItem(
"mode",
"checked"
);


location.href="study.html";

}





// 進捗表示

function showProgress(){


fetch("problems.csv")


.then(response=>response.text())


.then(data=>{


let rows=
data.trim().split(/\r?\n/);


let total=
rows.length-1;



let done=

JSON.parse(

localStorage.getItem("doneQuestions")
||
"[]"

);



let percent=0;


if(total>0){

percent=

Math.round(

(done.length/total)*100

);

}




if(percent>=100){


document.getElementById("progressText").innerHTML=

"🎉 全問終了しました";


document.getElementById("progressInner").style.width=

"100%";


}

else{


document.getElementById("progressText").textContent=

done.length
+
" / "
+
total
+
" 問完了（"
+
percent
+
"%）";


document.getElementById("progressInner").style.width=

percent+"%";


}



});


}






// 分類・タイプ作成

function createMenu(){


fetch("problems.csv")


.then(response=>response.text())


.then(data=>{


let rows=
data.trim().split(/\r?\n/);



let categories=[];

let types=[];



for(let i=1;i<rows.length;i++){


let cols=
rows[i].split(",");



if(
!categories.includes(cols[2])
){

categories.push(cols[2]);

}



if(
!types.includes(cols[1])
){

types.push(cols[1]);

}


}





let categoryArea=
document.getElementById("categoryArea");



categories.forEach(function(c){


let btn=
document.createElement("button");


btn.textContent=c;



btn.onclick=function(){


localStorage.setItem(
"mode",
"category"
);



localStorage.setItem(
"category",
c
);



location.href="study.html";


};



categoryArea.appendChild(btn);


});







let typeArea=
document.getElementById("typeArea");



types.forEach(function(t){



let btn=
document.createElement("button");


btn.textContent=t;



btn.onclick=function(){


localStorage.setItem(
"mode",
"type"
);



localStorage.setItem(
"type",
t
);



location.href="study.html";


};



typeArea.appendChild(btn);



});



});



}





showProgress();


createMenu();



</script>


</div>


</body>


</html>
