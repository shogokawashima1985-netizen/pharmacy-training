<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>
処方監査問題集
</title>


<style>


body{

font-family:"メイリオ",sans-serif;

background:#f5f5f5;

margin:30px;

}


.container{

background:white;

max-width:800px;

margin:auto;

padding:30px;

border-radius:10px;

}


h1{

text-align:center;

}


#status{

text-align:center;

font-size:18px;

margin:20px;

}


.box{

margin-top:25px;

padding:20px;

border:1px solid #ccc;

border-radius:8px;

}


button{

padding:12px 25px;

font-size:16px;

margin:10px;

cursor:pointer;

}


select{

padding:8px;

font-size:16px;

width:250px;

}


</style>


</head>


<body>


<div class="container">


<h1>
処方監査問題集
</h1>


<div id="status">

</div>




<div class="box">


<h2>
開始方法
</h2>



<button onclick="startAll()">

最初から開始

</button>



<button onclick="continueStudy()">

前回の続きから開始

</button>


</div>





<div class="box">


<h2>
復習メニュー
</h2>



<button onclick="startRandom()">

ランダム10問

</button>




<button onclick="startChecked()">

✓復習問題

</button>



</div>





<div class="box">


<h2>
分類から開始
</h2>



<select id="category">


<option value="all">

すべて

</option>


</select>



<button onclick="startCategory()">

開始

</button>


</div>





<div class="box">


<h2>
問題タイプから開始
</h2>



<select id="type">



<option value="all">

すべて

</option>



<option value="複数選択">

複数選択

</option>



<option value="自由記載">

自由記載

</option>



<option value="監査">

監査

</option>



</select>



<button onclick="startType()">

開始

</button>


</div>
<script>


let problems=[];



fetch("problems.csv")


.then(response=>response.text())


.then(data=>{


let rows=data.trim().split(/\r?\n/);



for(let i=1;i<rows.length;i++){


let cols=rows[i].split(",");



problems.push({

id:cols[0],

type:cols[1],

category:cols[2],

title:cols[3],

question:cols[4],

choice:cols[5],

image:cols[6],

explanation:cols[7]


});


}



createCategory();

showStatus();


})


.catch(error=>{


alert(

"CSV読み込みエラー\n"+error

);


});





function createCategory(){


let select=document.getElementById("category");



let categories=[...new Set(

problems.map(
p=>p.category
)

)];



categories.forEach(function(c){


let option=document.createElement("option");


option.value=c;


option.textContent=c;


select.appendChild(option);


});


}




//問題数表示

function showStatus(){


let checked =

JSON.parse(

localStorage.getItem("checkedQuestions") || "[]"

);



document.getElementById("status").innerHTML =


"総問題数："
+
problems.length
+
"問<br>"
+
"復習待ち（✓）："
+
checked.length
+
"問";


}





//最初から

function startAll(){


localStorage.setItem(

"mode",

"all"

);



localStorage.removeItem(

"lastIndex"

);



location.href="study.html";


}





//続きから

function continueStudy(){


localStorage.setItem(

"mode",

"continue"

);



location.href="study.html";


}






//分類

function startCategory(){


let category=

document.getElementById("category").value;



localStorage.setItem(

"mode",

"category"

);



localStorage.setItem(

"category",

category

);



localStorage.removeItem(

"lastIndex"

);



location.href="study.html";


}






//問題タイプ

function startType(){


let type=

document.getElementById("type").value;



localStorage.setItem(

"mode",

"type"

);



localStorage.setItem(

"type",

type

);



localStorage.removeItem(

"lastIndex"

);



location.href="study.html";


}






//ランダム10問

function startRandom(){


localStorage.setItem(

"mode",

"random"

);



localStorage.removeItem(

"lastIndex"

);



location.href="study.html";


}





//✓問題

function startChecked(){


localStorage.setItem(

"mode",

"checked"

);



localStorage.removeItem(

"lastIndex"

);



location.href="study.html";


}



</script>


</div>

</body>

</html>
