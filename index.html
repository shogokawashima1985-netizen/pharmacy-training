<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>
処方監査問題集
</title>


<style>

body{

font-family:"メイリオ",sans-serif;

background:#f5f5f5;

margin:30px;

}


.container{

background:white;

max-width:700px;

margin:auto;

padding:30px;

border-radius:10px;

text-align:center;

}



h1{

font-size:28px;

}



button{

width:80%;

padding:15px;

margin:10px;

font-size:18px;

cursor:pointer;

}



.progressBox{

margin-top:30px;

text-align:left;

}



.progressBar{

height:20px;

background:#ddd;

border-radius:10px;

}



.progressInner{

height:20px;

background:#4caf50;

border-radius:10px;

width:0%;

}



.menuTitle{

margin-top:30px;

font-size:20px;

font-weight:bold;

}



</style>


</head>



<body>


<div class="container">


<h1>
処方監査問題集
</h1>



<button onclick="startAll()">

最初から

</button>


<button onclick="continueStudy()">

続きから

</button>


<button onclick="startRandom()">

ランダム10問

</button>


<button onclick="startChecked()">

✓復習問題

</button>



<div class="progressBox">


<h2>
学習進捗
</h2>


<div id="progressText">

読み込み中...

</div>


<br>


<div class="progressBar">

<div id="progressInner"
class="progressInner">

</div>

</div>



</div>





<div class="menuTitle">

分類から

</div>


<div id="categoryArea">

</div>





<div class="menuTitle">

問題タイプから

</div>


<div id="typeArea">

</div>
<script>


// 最初から

function startAll(){

localStorage.setItem(
"mode",
"all"
);

localStorage.setItem(
"lastIndex",
"0"
);


location.href="study.html";


}



// 続きから

function continueStudy(){


localStorage.setItem(
"mode",
"continue"
);


location.href="study.html";


}




// ランダム10問

function startRandom(){


localStorage.setItem(
"mode",
"random"
);


location.href="study.html";


}





// ✓復習問題

function startChecked(){


localStorage.setItem(
"mode",
"checked"
);


location.href="study.html";


}





// 進捗表示

function showProgress(){



fetch("problems.csv")


.then(response=>response.text())


.then(data=>{


let rows=
data.trim().split(/\r?\n/);


let total=
rows.length-1;



let done=

JSON.parse(

localStorage.getItem("doneQuestions")
||
"[]"

);



let percent=0;



if(total>0){


percent=

Math.round(

(done.length/total)*100

);


}



document.getElementById("progressText").textContent=

done.length
+
" / "
+
total
+
" 問完了（"
+
percent
+
"%）";



document.getElementById("progressInner").style.width=

percent+"%";



});


}




// 分類・タイプ作成

function createMenu(){


fetch("problems.csv")


.then(response=>response.text())


.then(data=>{


let rows=
data.trim().split(/\r?\n/);



let categories=[];

let types=[];



for(let i=1;i<rows.length;i++){


let cols=
rows[i].split(",");



if(
!categories.includes(cols[2])
){

categories.push(cols[2]);

}



if(
!types.includes(cols[1])
){

types.push(cols[1]);

}


}




let categoryArea=
document.getElementById("categoryArea");


categories.forEach(function(c){



let btn=
document.createElement("button");


btn.textContent=c;


btn.onclick=function(){


localStorage.setItem(
"mode",
"category"
);


localStorage.setItem(
"category",
c
);


location.href="study.html";


};



categoryArea.appendChild(btn);


});





let typeArea=
document.getElementById("typeArea");



types.forEach(function(t){



let btn=
document.createElement("button");


btn.textContent=t;



btn.onclick=function(){


localStorage.setItem(
"mode",
"type"
);


localStorage.setItem(
"type",
t
);



location.href="study.html";


};



typeArea.appendChild(btn);



});



});



}





showProgress();


createMenu();



</script>



</div>


</body>


</html>
