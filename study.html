<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>処方監査問題集</title>


<style>

body{

font-family:"メイリオ",sans-serif;
background:#f5f5f5;
margin:30px;

}


.container{

background:white;
max-width:900px;
margin:auto;
padding:30px;
border-radius:15px;

}



h1{

color:#1a4f7a;

}



.progressArea{

display:flex;
justify-content:space-between;
align-items:center;

}



.question{

font-size:20px;
line-height:1.6;
margin-top:20px;

}



.choice{

margin:12px 0;
font-size:18px;

}



textarea{

width:100%;
height:150px;
font-size:16px;

}



button{

padding:12px 25px;
font-size:16px;
margin:10px;
cursor:pointer;

}



button:disabled{

opacity:0.5;

}



img{

max-width:100%;
margin-top:20px;

}



.explanation{

background:#eef5ff;
padding:20px;
margin-top:20px;
border-radius:10px;
display:none;

}



.checkArea{

margin-top:20px;

}


</style>


</head>


<body>


<div class="container">


<h1>
💊 処方監査問題集
</h1>



<div class="progressArea">


<div id="progress"></div>


<button onclick="skipQuestion()">

問題スキップ

</button>


</div>



<h2 id="title"></h2>


<div id="question"
class="question">
</div>



<div id="imageArea"></div>


<div id="answerArea"></div>



<button onclick="showExplanation()">

回答確認

</button>



<div id="explanation"
class="explanation">


<h3>解説</h3>


<div id="result"></div>


<div id="explanationText"></div>



<div class="checkArea">

<label>

<input 
type="checkbox"
id="checkBox"
onchange="toggleCheck()">


この問題を復習リストに追加

</label>


</div>


</div>



<button id="nextButton"
onclick="nextQuestion()"
disabled>

次の問題

</button>



<button onclick="goHome()">

トップページへ戻る

</button>
<script>


let problems=[];

let studyList=[];

let currentIndex=0;




// CSV読み込み

fetch("problems.csv")

.then(response=>response.text())

.then(data=>{


let rows=data.trim().split(/\r?\n/);



for(let i=1;i<rows.length;i++){


let cols=rows[i].split(",");



problems.push({

id:cols[0].trim(),

type:cols[1].trim(),

category:cols[2].trim(),

title:cols[3].trim(),

question:cols[4].trim(),

choice:cols[5].trim(),

answer:cols[6].trim(),

image:cols[7].trim(),

explanation:cols[8].trim()

});


}



setStudyList();


});







function setStudyList(){


let mode=
localStorage.getItem("mode");



if(mode=="random"){


studyList=
shuffle([...problems]).slice(0,10);


}



else if(mode=="checked"){



let checked=
JSON.parse(
localStorage.getItem("checkedQuestions") || "[]"
);



studyList=
problems.filter(
p=>checked.includes(p.id)
);


}




else if(mode=="unlearned"){



let done=
JSON.parse(
localStorage.getItem("doneQuestions") || "[]"
);



studyList=
problems.filter(
p=>!done.includes(p.id)
);



}





else if(mode=="category"){



let c=
localStorage.getItem("category");



studyList=
problems.filter(
p=>p.category==c
);


}




else if(mode=="type"){



let t=
localStorage.getItem("type");



studyList=
problems.filter(
p=>p.type==t
);


}




else{


studyList=[...problems];


}




showQuestion();


}






function showQuestion(){



if(currentIndex>=studyList.length){


alert("終了です");


return;


}



let p=
studyList[currentIndex];



document.getElementById("progress").textContent=

"問題 "
+
(currentIndex+1)
+
" / "
+
studyList.length;




document.getElementById("title").textContent=
p.title;



document.getElementById("question").textContent=
p.question;





let imageArea=
document.getElementById("imageArea");


imageArea.innerHTML="";



if(p.image){


imageArea.innerHTML=

`
<img src="images/${p.image}">
`;

}




let answerArea=
document.getElementById("answerArea");


answerArea.innerHTML="";





// 選択問題

if(
p.type=="選択"
||
p.type=="複数選択"
){


p.choice.split(";")
.forEach(function(c){



answerArea.innerHTML+=

`

<div class="choice">

<label>

<input 
type="checkbox"
class="answerCheck"
value="${c}">


${c}

</label>

</div>

`;


});


}



// 自由記載

else{


answerArea.innerHTML=

`

<textarea
placeholder="回答を入力してください">
</textarea>

`;


}






document.getElementById("explanation").style.display="none";


document.getElementById("result").innerHTML="";


document.getElementById("explanationText").innerHTML="";


document.getElementById("nextButton").disabled=true;



updateCheck();


}





function showExplanation(){



let p=
studyList[currentIndex];


let result="";





if(
p.type=="選択"
||
p.type=="複数選択"
){



let selected=[];



document.querySelectorAll(".answerCheck:checked")

.forEach(function(box){


selected.push(box.value);


});



selected.sort();



let correct=
p.answer.split(";");



correct.sort();



if(
JSON.stringify(selected)
==
JSON.stringify(correct)

){


result=

"<h3>○ 正解</h3>";



}

else{


result=

"<h3>× 不正解</h3>"
+
"正解："
+
correct.join("、")
+
"<br><br>";



}



}

else{


result=

"<h3>回答を確認してください</h3>";



}



document.getElementById("result").innerHTML=
result;



document.getElementById("explanationText").innerHTML=
p.explanation;



document.getElementById("explanation").style.display="block";



document.getElementById("nextButton").disabled=false;



// 学習済み保存

markComplete(p.id);


}

// 次の問題

function nextQuestion(){


currentIndex++;


showQuestion();


}





// 問題スキップ

function skipQuestion(){


currentIndex++;


showQuestion();


}





// ランダム

function shuffle(array){


return array.sort(

()=>Math.random()-0.5

);


}





// ✓保存

function toggleCheck(){


let p=
studyList[currentIndex];



let checked=

JSON.parse(

localStorage.getItem("checkedQuestions")
||
"[]"

);



let box=
document.getElementById("checkBox");



if(box.checked){



if(!checked.includes(p.id)){


checked.push(p.id);


}



}

else{


checked=

checked.filter(

id=>id!==p.id

);


}



localStorage.setItem(

"checkedQuestions",

JSON.stringify(checked)

);



}




// ✓表示

function updateCheck(){



let p=
studyList[currentIndex];



let checked=

JSON.parse(

localStorage.getItem("checkedQuestions")
||
"[]"

);



document.getElementById("checkBox").checked=

checked.includes(p.id);



}






// 学習済み保存

function markComplete(id){



let done=

JSON.parse(

localStorage.getItem("doneQuestions")
||
"[]"

);



if(!done.includes(id)){


done.push(id);


}



localStorage.setItem(

"doneQuestions",

JSON.stringify(done)

);



}





// トップへ戻る

function goHome(){


location.href="index.html";


}



</script>


</div>


</body>


</html>
