<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<title>処方監査問題集</title>


<style>

body{
font-family:"メイリオ",sans-serif;
background:#f5f5f5;
margin:30px;
}


.container{

background:white;
max-width:900px;
margin:auto;
padding:30px;
border-radius:10px;

}


h1{

font-size:28px;

}


.progressArea{

display:flex;
align-items:center;
gap:20px;
font-size:18px;

}


.question{

font-size:20px;
margin-top:20px;
line-height:1.6;

}


.choice{

display:block;
margin:12px 0;
font-size:18px;

}


textarea{

width:100%;
height:150px;
font-size:16px;

}


button{

padding:12px 25px;
font-size:16px;
margin:10px;
cursor:pointer;

}


img{

max-width:100%;
margin-top:20px;

}


.explanation{

background:#eef5ff;
padding:20px;
margin-top:20px;
display:none;
border-radius:8px;

}


.checkArea{

font-size:16px;

}


</style>

</head>


<body>


<div class="container">


<h1>
処方監査問題集
</h1>


<div class="progressArea">


<div id="progress"></div>


<div class="checkArea">

<label>

<input 
type="checkbox" 
id="checkBox"
onchange="toggleCheck()">

この問題をチェック

</label>


</div>


</div>


<h2 id="title"></h2>


<div id="question" class="question"></div>


<div id="imageArea"></div>


<div id="answerArea"></div>


<button onclick="showExplanation()">

回答確認

</button>


<div id="explanation" class="explanation">


<h3>
解説
</h3>


<div id="explanationText"></div>


</div>


<button onclick="nextQuestion()">

次の問題

</button>


<button onclick="goHome()">

トップページへ戻る

</button>
<script>


let problems=[];

let studyList=[];

let currentIndex=0;




// CSV読み込み

fetch("problems.csv")


.then(response=>response.text())


.then(data=>{


let rows=data.trim().split(/\r?\n/);



for(let i=1;i<rows.length;i++){


let cols=rows[i].split(",");



problems.push({

id:cols[0],

type:cols[1],

category:cols[2],

title:cols[3],

question:cols[4],

choice:cols[5],

image:cols[6],

explanation:cols[7]

});


}



setStudyList();


})



.catch(error=>{


alert(
"CSV読み込みエラー\n"+error
);


});





//問題リスト作成

function setStudyList(){


let mode =
localStorage.getItem("mode");



if(mode=="category"){


let c =
localStorage.getItem("category");


studyList =
problems.filter(
p=>p.category==c
);


}


else if(mode=="type"){


let t =
localStorage.getItem("type");


studyList =
problems.filter(
p=>p.type==t
);


}



else if(mode=="random"){


studyList =
shuffle([...problems]).slice(0,10);


}



else if(mode=="checked"){



let checked =
JSON.parse(
localStorage.getItem("checkedQuestions") || "[]"
);



studyList =
problems.filter(
p=>checked.includes(p.id)
);


}



else{


studyList =
[...problems];


}





if(mode=="continue"){


let save =
localStorage.getItem("lastIndex");



if(save){

currentIndex=parseInt(save);

}


}



showQuestion();


}






//問題表示

function showQuestion(){


if(currentIndex >= studyList.length){


alert("終了です");


localStorage.removeItem("lastIndex");


return;


}



let p =
studyList[currentIndex];



document.getElementById("progress").textContent =

"問題 "
+
(currentIndex+1)
+
" / "
+
studyList.length;




document.getElementById("title").textContent =
p.title;



document.getElementById("question").textContent =
p.question;





let imageArea =
document.getElementById("imageArea");



imageArea.innerHTML="";



if(p.image){


imageArea.innerHTML=

`
<img src="PDF/${p.image}">
`;

}




let answerArea =
document.getElementById("answerArea");


answerArea.innerHTML="";





if(p.type=="複数選択"){



let choices =
p.choice.split(";");



choices.forEach(function(c){



let div =
document.createElement("div");


div.className="choice";


div.innerHTML=

`
<label>

<input type="checkbox">

${c}

</label>
`;



answerArea.appendChild(div);



});



}



else if(
p.type=="自由記載"
||
p.type=="監査"
){



answerArea.innerHTML=

`
<textarea placeholder="回答を入力してください"></textarea>
`;



}





document.getElementById("explanation").style.display="none";


document.getElementById("explanationText").textContent="";



localStorage.setItem(
"lastIndex",
currentIndex
);



updateCheck();



}






//解説表示

function showExplanation(){


let p =
studyList[currentIndex];


document.getElementById("explanationText").textContent =
p.explanation;



document.getElementById("explanation").style.display =
"block";


}






//次へ

function nextQuestion(){


currentIndex++;


showQuestion();


}




//ランダム

function shuffle(array){


return array.sort(
()=>Math.random()-0.5
);


}
//✓保存

function toggleCheck(){


let p =
studyList[currentIndex];


let checked =
JSON.parse(
localStorage.getItem("checkedQuestions") || "[]"
);



let box =
document.getElementById("checkBox");



if(box.checked){


if(!checked.includes(p.id)){


checked.push(p.id);


}


}else{


checked =
checked.filter(
id=>id!==p.id
);


}



localStorage.setItem(

"checkedQuestions",

JSON.stringify(checked)

);


}





//✓状態表示

function updateCheck(){


let p =
studyList[currentIndex];


let checked =
JSON.parse(
localStorage.getItem("checkedQuestions") || "[]"
);



let box =
document.getElementById("checkBox");



if(checked.includes(p.id)){


box.checked=true;


}else{


box.checked=false;


}


}




//トップページへ戻る

function goHome(){


location.href="index.html";


}



</script>


</div>

</body>

</html>
